<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account</title>
    <link rel="stylesheet" href="styleSignIn.css">
</head>
<body>
    <div>
        <div>
            Account:
        </div>
        <div>
            <p>Nome:</p>
            <div>
                <p id="nomeUtente"></p>
            </div>
        </div>
        <div>
            <p>Cognome:</p>
            <div>
                <p id="cognomeUtente"></p>
            </div>
        </div>
        <div>
            <p>Indirizzo:</p>
            <div>
                <p id="indirizzoUtente"></p>
            </div>
        </div>
        <div>
            <p>Cap:</p>
            <div>
                <p id="capUtente"></p>
            </div>
        </div>
        <div>
            <p>Email:</p>
            <div>
                <p id="emailUtente"></p>
            </div>
        </div>
        <div>
            <p>Password:</p>
            <div id="mostraPswDiv">
                
                <p id="pswUtente"></p>
                
                <input type="button" value="mostra password" id="mostraPswBtn" onclick="mostraPsw()">
                
            </div>
        </div>
        <div>
            <input type="button" value="Modifica i tuoi dati" id="cambiaDati" onclick="window.location.href='registrazione.html'">
        </div>
    </div>
</body>

<script>

    let elenco = JSON.parse(localStorage.getItem("elenco"));
    let utente = elenco[0];

    document.getElementById("nomeUtente").textContent = utente.nome;
    document.getElementById("cognomeUtente").textContent = utente.cognome;
    document.getElementById("indirizzoUtente").textContent = utente.indirizzo; 
    document.getElementById("capUtente").textContent = utente.cap;
    document.getElementById("emailUtente").textContent = utente.email; 
    document.getElementById("pswUtente").textContent = "**********"; 
    
    function mostraPsw(){
        let utente = elenco[0];
        document.getElementById("pswUtente").innerHTML = utente.psw;
    }

</script>

</html>
