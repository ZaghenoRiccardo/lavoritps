<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrati</title>
    <link rel="stylesheet" href="styleSignIn.css">
</head>
<body>
    
    <div>
        <div>
            Registrati:
        </div>
        <div>
        
            <p>Nome:</p>
            <input type="text" id="nome" placeholder="nome">
            <p id="error"></p>
        </div>
        <div>
            <p>Cognome:</p>
            <input type="text" id="cognome" placeholder="cognome">
            <p id="error"></p>
        </div>
        <div>
            <p>Indirizzo:</p>
            <input type="text" id="indirizzo" placeholder="indirizzo">
            <p id="error"></p>
        </div>
        <div>
            <p>Cap:</p>
            <input type="text" id="cap" placeholder="cap">
            <p id="error"></p>
        </div>
        <div>
            <p>Email:</p>
            <input type="text" id="email" placeholder="email">
            <p id="error"></p>
        </div>

        <div>
            <p>Password:</p>
            <input type="text" id="password" placeholder="password">
            <p id="error"></p>
        </div>
        <div>
            <input type="button" value="inserisci" onclick="controlla()">
            <p id="error"></p>
        </div>
    </div>

</body>

<script>
    function controlla(){
        let flag = false;

        let nomeTest = document.getElementById("nome").value;
        const nomeRegex = /^[A-Za-zÀ-ÖØ-öø-ÿ' -]{2,50}$/;
        if(nomeRegex.test(nomeTest) == false){
           flag = true;
        }

        let cognomeTest = document.getElementById("cognome").value;
        const cognomeRegex = /^[A-Za-zÀ-ÖØ-öø-ÿ]+(?:[ '-][A-Za-zÀ-ÖØ-öø-ÿ]+)*$/;
        if(cognomeRegex.test(cognomeTest) == false){
         flag = true;
        }

        let indirizzoTest = document.getElementById("indirizzo").value;
        const indirizzoRegex = /^[A-Za-zÀ-ÖØ-öø-ÿ0-9\s.,'\/-]{5,100}$/;
        if(indirizzoRegex.test(indirizzoTest) == false){
            flag = true;
        }

        let capTest = document.getElementById("cap").value;
        const capRegex = /^\d{5}$/;
        if(capRegex.test(capTest) == false){
            flag = true;
        }

        let emailTest = document.getElementById("email").value;
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if(emailRegex.test(emailTest) == false){
          flag = true;
        }

        let pswTest = document.getElementById("password").value;
        const pswRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/; // (minimo 8 caratteri) almeno 1 lettera maiuscola almeno 1 minuscola almeno 1 numero almeno 1 simbolo
        if (pswRegex.test(pswTest) == false){
            flag = true;
        }

        if(flag == true){
            document.getElementById("error").innerHTML ="Errore, ricontrollare i campi";
        } else{
            document.getElementById("error").innerHTML = "Registrazione Completata";












            
        }

    }
</script>

</html>
