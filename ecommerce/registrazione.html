<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrati</title>
    <link rel="stylesheet" href="styleSignIn.css">
</head>
<body>
    
    <div>
        <div>
            Registrati:
        </div>
        <div>
        
            <p>Nome:</p>
            <input type="text" id="nome" placeholder="nome">
            <p id="error"></p>
        </div>
        <div>
            <p>Cognome:</p>
            <input type="text" id="cognome" placeholder="cognome">
            <p id="error"></p>
        </div>
        <div>
            <p>Indirizzo:</p>
            <input type="text" id="indirizzo" placeholder="indirizzo">
            <p id="error"></p>
        </div>
        <div>
            <p>Cap:</p>
            <input type="text" id="cap" placeholder="cap">
            <p id="error"></p>
        </div>
        <div>
            <p>Email:</p>
            <input type="text" id="email" placeholder="email">
            <p id="error"></p>
        </div>
        <div>
            <p>Password:</p>
            <input type="text" id="password" placeholder="password">
            <p id="error"></p>
        </div>
        <div>
            <input type="button" value="inserisci" onclick="controlla()">
            <p id="error"></p>
        </div>
    </div>

</body>
</html>
