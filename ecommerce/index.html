<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="accountMenu()">

    <!-- HEADER -->
    <div class="header">
        <div class="titolo">
            <h1>Ecommerce Musicale</h1>
        </div>

        <div class="carrelloIntestazione">
            <p>Carrello</p>
            <p>(</p>
            <p id="nOggettiCarrello"></p>
            <p>)</p>
            <p>:</p>
            <p id="costoCarrello"></p>
            <p>€</p>
        </div>
    </div>

    <!-- NAVBAR -->
    <div class="navbar">
        <a href="home.html">Home</a>
        <a href="carrello.html">Carrello</a>
        <span id="accountId">
            <a href="registrazione.html">Registrati</a>
        </span>
    </div>

    <!-- PRODOTTI -->
    <div id="divProdotti" class="prodotti"></div>


    <!--Footer con contatti-->


    <hr>

    <div>

    </div>
</body>

<script>

    function accountMenu(){
        if (localStorage.getItem("elenco")){
            let account = '<a href="account.html">Account</a>';
            document.getElementById("accountId").innerHTML = account;
        }
    }

    let prodotti = document.getElementById("divProdotti")
    window.addEventListener("load", async function () {
    const response = await fetch('csv1.csv');
    const blob = await response.blob();

    const reader = new FileReader();
    reader.onload = function (e) {
      const testo = e.target.result;
      const dati = parseCSV(testo);
    };
    reader.readAsText(blob);
  });

  function parseCSV(testo) {
    const righe = testo.trim().split("\n");
    
    for (var i = 1; i < righe.length; i++) { // parte da 1 per saltare l'intestazione
        const col = righe[i].split(",");

        const immagine    = col[4];
        const prezzo      = col[5];
        const marca       = col[2];
        const nome        = col[1];
        const dimensioni  = col[6];
        const taglia      = col[7];
        const spedizione  = col[8];
        const descrizione = col[3];

        prodotti.innerHTML += `
            <div>
                <img src="${immagine}" alt="${nome}">
                <p>${prezzo}</p>
                <div class="titolo">
                    <p>${marca} </p>
                    <p>${nome}</p>
                </div>
                <p>${descrizione}</p>
                <div class="riga">
                    <p>Dimensioni: </p>
                    <p>${dimensioni}</p>
                </div>
                <div class="riga">
                    <p>Taglia: </p>
                    <p>${taglia}</p>
                </div>
                <div class="riga">
                    <p>Tempo spedizione: </p>
                    <p>${spedizione}</p>
                </div>
            </div>
        `;
    }
}


</script>

</html>
