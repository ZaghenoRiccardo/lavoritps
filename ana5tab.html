<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pag2</title>
</head>
<body>
    
    <table id="tabella">
    <tr>
        <th>Nome</th>
        <th>Cognome</th>
        <th>Città</th>
        <th>Indirizzo</th>
        <th>Anno di nascita</th>
    </tr>
</table>
    
    <br>
    <a href="ana5.html">Passa alla pagina precedente</a>

</body>

<script>

let elenco = JSON.parse(localStorage.getItem("elenco"));

let tabella = document.getElementById("tabella");

elenco.forEach(function(persona) {
    
    let tr = document.createElement("tr");

    let tdNome = document.createElement("td");
    let tdCognome = document.createElement("td");
    let tdCitta = document.createElement("td");
    let tdIndirizzo = document.createElement("td");
    let tdAnno = document.createElement("td");

    tdNome.textContent = persona.nome;
    tdCognome.textContent = persona.cognome;
    tdCitta.textContent = persona.citta;
    tdIndirizzo.textContent = persona.indirizzo;
    tdAnno.textContent = persona.annoNascita;

    tr.appendChild(tdNome);
    tr.appendChild(tdCognome);
    tr.appendChild(tdCitta);
    tr.appendChild(tdIndirizzo);
    tr.appendChild(tdAnno);

    tabella.appendChild(tr);

});

</script>

<style>
    table {
      border-collapse: collapse;
      width: 100%;
      font-family: Arial, sans-serif;
    }
    
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }
    
    th {
      background-color: #f2f2f2;
    }
</style>

</html>
